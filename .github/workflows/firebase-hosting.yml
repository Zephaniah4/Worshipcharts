name: Firebase Hosting Deploy

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Flutter Web
        run: flutter config --enable-web

      - name: Ensure web platform scaffold exists
        working-directory: apps/worship_app
        run: |
          if [ ! -d web ]; then
            flutter create . --platforms=web
          fi

      - name: Install Dependencies
        working-directory: apps/worship_app
        run: flutter pub get

      - name: Analyze
        working-directory: apps/worship_app
        run: flutter analyze

      - name: Run Tests
        working-directory: apps/worship_app
        run: flutter test

      - name: Build Web
        working-directory: apps/worship_app
        run: flutter build web --release

      - name: Validate Firebase deploy secrets for main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
            echo "FIREBASE_PROJECT_ID secret is missing."
            exit 1
          fi

      - name: Skip preview deploy for fork PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        run: echo "Skipping Firebase preview deploy for fork PR because secrets are not exposed."

      - name: Deploy to Firebase Hosting (Preview)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && secrets.FIREBASE_SERVICE_ACCOUNT != '' && secrets.FIREBASE_PROJECT_ID != ''
        uses: FirebaseExtended/action-hosting-deploy@v1
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Hosting (Live)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.FIREBASE_SERVICE_ACCOUNT != '' && secrets.FIREBASE_PROJECT_ID != ''
        uses: FirebaseExtended/action-hosting-deploy@v1
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
